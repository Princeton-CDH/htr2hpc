name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Prevent uv from including dev dependencies by default
  UV_NO_DEV: 1
  # Prevent uv run from syncing by default
  UV_NO_SYNC: 1

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out htr2hpc
        uses: actions/checkout@v4
        with:
          path: htr2hpc

      - name: Check out eScriptorium
        run: git clone --depth 1 https://gitlab.com/scripta/escriptorium.git escriptorium

      - name: Install uv and Python ${{ matrix.python-version }}
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install htr2hpc with test dependencies
        working-directory: htr2hpc
        run: uv sync --extra test

      - name: Install eScriptorium dependencies
        working-directory: htr2hpc
        run: uv pip install -r ../escriptorium/app/requirements.txt

      - name: Run tests with coverage
        working-directory: htr2hpc
        env:
          ESCRIPTORIUM_ROOT: ${{ github.workspace }}/escriptorium
        run: uv run pytest --cov --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./htr2hpc/coverage.xml
          flags: unittests
          token: ${{ secrets.CODECOV_TOKEN }}
