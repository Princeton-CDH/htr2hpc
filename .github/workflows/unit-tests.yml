name: unit tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Prevent uv from including dev dependencies by default
  UV_NO_DEV: 1
  # Prevent uv run from syncing by default
  UV_NO_SYNC: 1
  # eScriptorium version to test against (track the version deployed via cdh-ansible)
  ESCRIPTORIUM_GITREF: dev-0.14.2

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out htr2hpc
        uses: actions/checkout@v4
        with:
          path: htr2hpc

      # Shallow clone of the known eScriptorium version we develop and test against.
      # PYTHONPATH is set below so htr2hpc can import eScriptorium app modules.
      - name: Check out eScriptorium ${{ env.ESCRIPTORIUM_GITREF }}
        run: git clone --depth 1 --branch ${{ env.ESCRIPTORIUM_GITREF }} https://gitlab.com/scripta/escriptorium.git escriptorium

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install htr2hpc with dev dependencies
        working-directory: htr2hpc
        run: uv sync --extra dev

      - name: Install eScriptorium dependencies
        working-directory: htr2hpc
        run: uv pip install -r ../escriptorium/app/requirements.txt

      - name: Run tests with coverage
        working-directory: htr2hpc
        env:
          # eScriptorium app modules are imported directly (no running services needed).
          # app/apps contains the Django apps; app is needed for top-level imports.
          PYTHONPATH: ${{ github.workspace }}/escriptorium/app/apps:${{ github.workspace }}/escriptorium/app
          DJANGO_SECRET_KEY: ${{ github.run_id }}-${{ github.run_attempt }}-test-secret
        run: uv run pytest --cov --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./htr2hpc/coverage.xml
          flags: unittests
          token: ${{ secrets.CODECOV_TOKEN }}
