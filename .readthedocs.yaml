# ReadTheDocs configuration
# https://docs.readthedocs.io/en/stable/config-file/v2.html

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.11"
  commands:
    - uv sync --group docs
    - uv run sphinx-build -b html sphinx-docs/ $READTHEDOCS_OUTPUT/html

sphinx:
  configuration: sphinx-docs/conf.py
